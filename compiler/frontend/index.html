<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Cloud Compiler</title>

    <link rel="icon"
          type="image/png"
          href="cloud compiler.jpg">

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div class="main-container">

    <!-- LEFT SIDE -->

    <div class="editor-section">

        <!-- TOP BAR -->

        <div class="top-bar">

            <h1>
                Cloud Compiler 🚀
            </h1>

            <div class="top-controls">

                <!-- HISTORY BUTTON -->

                <button id="historyToggle"
                        onclick="loadHistory()">

                    📜 History

                </button>

                <!-- LANGUAGE -->

                <select id="language"
                        onchange="changeLanguage()">

                    <option value="cpp">
                        C++
                    </option>

                    <option value="java">
                        Java
                    </option>

                    <option value="python">
                        Python
                    </option>

                </select>

            </div>

        </div>

        <!-- EDITOR -->

        <div id="editor"></div>

        <!-- RUN BUTTON -->

        <button class="run-btn"
                onclick="runCode()">

            ▶ Run Code

        </button>

    </div>

    <!-- RIGHT SIDE -->

    <div class="side-panel">

        <!-- INPUT -->

        <div class="panel-box">

            <h2>Input</h2>

            <textarea id="input"
                      placeholder="Enter Input Here"></textarea>

        </div>

        <!-- OUTPUT -->

        <div class="panel-box">

            <h2>Output</h2>

            <pre id="output"></pre>

        </div>

    </div>

</div>

<!-- MONACO -->

<script
        src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js">

</script>

<script src="script.js"></script>

</body>

</html>
